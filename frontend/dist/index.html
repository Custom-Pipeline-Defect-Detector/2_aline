<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Aline AI Doc Hub</title>
    <meta
      name="description"
      content="Aline AI Doc Hub — browse, search, and manage documentation."
    />

    <!-- Social preview -->
    <meta property="og:title" content="Aline AI Doc Hub" />
    <meta
      property="og:description"
      content="Browse, search, and manage Aline AI documentation."
    />
    <meta property="og:type" content="website" />

    <!-- Theme -->
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)" />

    <!-- Favicon (optional) -->
    <!-- <link rel="icon" href="/favicon.ico" /> -->

    <!-- Preconnect + font (optional, remove if you prefer system fonts only) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f6f7fb;
        --card: rgba(255, 255, 255, 0.85);
        --text: #0b1220;
        --muted: rgba(11, 18, 32, 0.65);
        --border: rgba(11, 18, 32, 0.10);
        --shadow: 0 20px 60px rgba(11, 18, 32, 0.12);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #070a12;
          --card: rgba(15, 23, 42, 0.55);
          --text: rgba(255, 255, 255, 0.92);
          --muted: rgba(255, 255, 255, 0.65);
          --border: rgba(255, 255, 255, 0.12);
          --shadow: 0 22px 70px rgba(0, 0, 0, 0.55);
        }
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

        background: radial-gradient(
            1200px 800px at 15% 10%,
            rgba(99, 102, 241, 0.18),
            transparent 55%
          ),
          radial-gradient(
            900px 600px at 85% 15%,
            rgba(56, 189, 248, 0.14),
            transparent 55%
          ),
          radial-gradient(
            1000px 700px at 50% 95%,
            rgba(236, 72, 153, 0.10),
            transparent 60%
          ),
          var(--bg);
      }

      #root {
        min-height: 100%;
      }

      /* App loading shell (visible until React mounts) */
      .boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .panel {
        width: min(920px, 100%);
        border: 1px solid var(--border);
        background: var(--card);
        box-shadow: var(--shadow);
        border-radius: 22px;
        overflow: hidden;
        backdrop-filter: blur(14px);
      }

      .panel-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 1), rgba(56, 189, 248, 1));
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.30);
      }

      .title {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
      }

      .title strong {
        font-size: 14px;
        letter-spacing: 0.2px;
      }

      .title span {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }

      .panel-body {
        padding: 18px 20px 22px;
      }

      .skeleton {
        display: grid;
        gap: 12px;
      }

      .row {
        height: 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.0),
          rgba(255, 255, 255, 0.35),
          rgba(255, 255, 255, 0.0)
        );
        background-size: 220% 100%;
        animation: shimmer 1.2s ease-in-out infinite;
      }

      @media (prefers-color-scheme: dark) {
        .row {
          background: linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.0),
            rgba(255, 255, 255, 0.10),
            rgba(255, 255, 255, 0.0)
          );
        }
      }

      .row.w1 { width: 55%; }
      .row.w2 { width: 85%; }
      .row.w3 { width: 78%; }
      .row.w4 { width: 62%; }
      .row.w5 { width: 90%; }

      @keyframes shimmer {
        0% { background-position: 0% 0; }
        100% { background-position: 220% 0; }
      }

      .hint {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
      }

      /* Hide loading shell once React renders something */
      #root:not(:empty) .boot {
        display: none;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BURCVbyf.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DwNrmP1U.css">
  </head>

  <body>
    <div id="root">
      <!-- Loading shell (will disappear when React mounts) -->
      <div class="boot" aria-label="Loading Aline AI Doc Hub">
        <div class="panel">
          <div class="panel-header">
            <div class="logo" aria-hidden="true"></div>
            <div class="title">
              <strong>Aline AI Doc Hub</strong>
              <span>Loading workspace…</span>
            </div>
          </div>

          <div class="panel-body">
            <div class="skeleton" role="status" aria-live="polite">
              <div class="row w2"></div>
              <div class="row w5"></div>
              <div class="row w3"></div>
              <div class="row w4"></div>
              <div class="row w1"></div>
            </div>
            <div class="hint">If this takes long, check the dev console for errors.</div>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
